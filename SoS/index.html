<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تدبير المساهمات</title>
    <!-- ربط ملف الـ Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4285f4">
    <!-- إعدادات أيقونة آبل -->
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        /* إزالة الحواف وجعل الإطار يملأ الشاشة بالكامل */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- عرض تطبيق GAS الخاص بك -->
    <iframe src="https://script.google.com/macros/s/AKfycbxl34NM8qLvrhUB3CyY5U_xYKF3-vtYg_BgaUpIBa7PEUvqb2OX97lKoq6tzBrANi5y/exec"></iframe>

    <!-- تسجيل Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker registered successfully:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
